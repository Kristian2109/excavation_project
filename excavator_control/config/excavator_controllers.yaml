# excavator_controllers.yaml
# ros2_control controller configuration for the excavator robot

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # --- Active controllers ---
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - cabin_joint
      - boom_joint
      - stick_joint
      - bucket_joint

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0

    allow_partial_joints_goal: false
    open_loop_control: true

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
